[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "z"
version = "0.4.0"
description = "Python encryption utilities with multiple encryption modes"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "z contributors" }]
dependencies = ["pycryptodome>=3.20"]

[tool.setuptools.packages.find]
where = ["."]
include = ["z*"]

[project.scripts]
zi = "z.cli:main"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"
